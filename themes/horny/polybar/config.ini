; ╔══════════════════════════════════════════════════════════════════════════╗
; ║                 POLYBAR CONFIG - HORNY MODE 🔥💦                          ║
; ║              Warm reds and teasing oranges, dripping with desire        ║
; ╚══════════════════════════════════════════════════════════════════════════╝

[settings]
screenchange-reload = true
compositing-background = source
compositing-foreground = over
compositing-overline = over
compositing-underline = over

[colors]
; Warm, teasing maroons and fiery oranges
background = #2e0a1a
background-alt = #4e152d
foreground = #ffa07a
foreground-alt = #ff7f50
primary = #ff4500        ; Orange red - hot!
secondary = #ff6347      ; Tomato - warm and ready
accent = #ff8c00         ; Dark orange
alert = #dc143c          ; Crimson alert
disabled = #6e4c56
accent1 = #ff4500
accent2 = #ff6347
accent3 = #ff7f50
transparent = #00000000

[bar/main]
monitor = ${env:MONITOR:}
width = 100%
height = 36pt            ; Slightly smaller than degenerate
radius = 10               ; Soft rounded corners
line-size = 3pt
line-color = ${colors.primary}

cursor-click = pointer
cursor-scroll = ns-resize

background = ${colors.background}
foreground = ${colors.foreground}

padding-left = 3
padding-right = 3

module-margin = 2

; Warm separator
separator = ┃
separator-foreground = ${colors.primary}

; Sexy fonts
font-0 = "JetBrainsMono Nerd Font:style=Bold:size=11;2"
font-1 = "Noto Color Emoji:scale=10;2"
font-2 = "Font Awesome 6 Free:style=Solid:pixelsize=12;2"
font-3 = "Font Awesome 6 Brands:pixelsize=12;2"
font-4 = "DejaVu Sans Mono:style=Bold:pixelsize=11;2"

modules-left = i3 xwindow
modules-center = mode-indicator wetness-meter
modules-right = filesystem pulseaudio memory cpu temperature date panic

trailing-padding = 2

enable-ipc = true

; ═══════════════════════════════════════════════════════════════════════════
; TEASING MODULES - FOR THE HORNY TEASE
; ═══════════════════════════════════════════════════════════════════════════

[module/panic]
; 🚨 PANIC BUTTON - CLICK TO COOL DOWN!
type = custom/text
content = 🚨 PANIC 🚨
content-foreground = ${colors.alert}
content-background = ${colors.background-alt}
content-padding = 3
content-underline = ${colors.alert}

; Click to activate panic mode!
click-left = ~/.local/bin/panic-button

[module/i3]
type = internal/i3
format = <label-state> <label-mode>
index-sort = true
wrapping-scroll = false

pin-workspaces = true

label-mode-padding = 2
label-mode-foreground = #000
label-mode-background = ${colors.primary}

; Warm focused styling
label-focused = 🔥 %name%
label-focused-background = ${colors.background-alt}
label-focused-foreground = ${colors.foreground}
label-focused-underline = ${colors.primary}
label-focused-padding = 3

label-unfocused = %name%
label-unfocused-padding = 3
label-unfocused-foreground = ${colors.disabled}

label-visible = %name%
label-visible-background = ${colors.background-alt}
label-visible-underline = ${colors.secondary}
label-visible-padding = 3
label-visible-foreground = ${colors.foreground-alt}

label-urgent = 🚨 %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 3
label-urgent-foreground = #fff

[module/xwindow]
type = internal/xwindow
label = 💦 %title:0:50:...%
label-foreground = ${colors.accent3}
label-maxlen = 50

[module/mode-indicator]
type = custom/text
content = 🔥 HORNY 🔥
content-foreground = ${colors.primary}
content-background = ${colors.background-alt}
content-padding = 4
content-font = 4

[module/wetness-meter]
; 💧 WETNESS METER - HOW TURNED ON ARE YOU?
type = custom/script
exec = echo "💧 WET $(shuf -i 60-95 -n 1)%"
interval = 30
format-foreground = ${colors.secondary}
format-background = ${colors.background-alt}
format-padding = 2
format-underline = ${colors.primary}
click-left = notify-send "💧 WETNESS METER" "Current arousal level: $(shuf -i 60-95 -n 1)%\n\nYou're getting warmed up... 🔥"
click-right = notify-send "💧 CALMING DOWN..." "Deep breaths... cooling off... 💨"

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = 💾 %percentage_used%%
label-mounted-foreground = ${colors.accent1}
label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "🔊 "
format-volume-prefix-foreground = ${colors.accent1}
format-volume = <label-volume>

label-volume = %percentage%%
label-volume-foreground = ${colors.foreground}

label-muted = 🔇 QUIET
label-muted-foreground = ${colors.disabled}

click-right = exec pactl set-sink-mute @DEFAULT_SINK@ toggle

[module/memory]
type = internal/memory
interval = 2
format-prefix = "🧠 "
format-prefix-foreground = ${colors.accent2}
label = %percentage_used%%
label-foreground = ${colors.foreground}

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "⚡ "
format-prefix-foreground = ${colors.accent3}
label = %percentage%%
label-foreground = ${colors.foreground}

[module/temperature]
type = internal/temperature
thermal-zone = 0
warn-temperature = 75
base-temperature = 40

format = <ramp> <label>
format-warn = <ramp> <label-warn>
format-warn-foreground = ${colors.alert}

label = %temperature-c%°C
label-warn = 🥵 %temperature-c%°C

ramp-0 = ❄️
ramp-1 = 💧
ramp-2 = 🔥
ramp-3 = 🥵
ramp-4 = ☀️
ramp-foreground = ${colors.accent3}

[module/date]
type = internal/date
interval = 1

date = 🕐 %H:%M
date-alt = 📅 %Y-%m-%d 🕐 %H:%M:%S

label = %date%
label-foreground = ${colors.foreground}

[module/wlan]
type = internal/network
interface-type = wireless
interval = 3

format-connected = <ramp-signal> <label-connected>
format-connected-underline = ${colors.secondary}

format-disconnected =

label-connected = %essid%
label-connected-foreground = ${colors.foreground}

ramp-signal-0 = 📶
ramp-signal-1 = 📶
ramp-signal-2 = 📶
ramp-signal-3 = 📶
ramp-signal-4 = 📶
ramp-signal-foreground = ${colors.accent1}

[module/eth]
type = internal/network
interface-type = wired
interval = 3

format-connected-prefix = "🌐 "
format-connected-prefix-foreground = ${colors.accent1}
label-connected = %local_ip%
label-connected-foreground = ${colors.foreground}

format-disconnected =

[module/battery]
type = internal/battery
full-at = 99
low-at = 10
battery = BAT0
adapter = ADP1
poll-interval = 5

format-charging = <animation-charging> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
format-full = <ramp-capacity> <label-full>
format-low = <animation-low> <label-low>

label-charging = ⚡ %percentage%%
label-discharging = %percentage%%
label-full = 100%
label-low = 🪫 %percentage%% LOW!

label-charging-foreground = ${colors.foreground}
label-discharging-foreground = ${colors.foreground}
label-full-foreground = ${colors.accent1}
label-low-foreground = ${colors.alert}

ramp-capacity-0 = 🪫
ramp-capacity-1 = 🔋
ramp-capacity-2 = 🔋
ramp-capacity-3 = 🔋
ramp-capacity-4 = 🔋

animation-charging-0 = ⚡
animation-charging-1 = 🔌
animation-charging-framerate = 750

animation-low-0 = 🪫
animation-low-1 = 🚨
animation-low-framerate = 200

; vim: ft=dosini
