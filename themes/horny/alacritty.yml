# ╔══════════════════════════════════════════════════════════════════════════╗
# ║            ALACRITTY CONFIG - HORNY MODE 🔥💦                            ║
# ║         Warm red/maroon background, orange accents, flirty vibe          ║
# ╚══════════════════════════════════════════════════════════════════════════╝

window:
  dimensions:
    columns: 120
    lines: 35
  padding:
    x: 10
    y: 6
  decorations: none
  startup_mode: Windowed
  opacity: 0.88

scrolling:
  history: 10000
  multiplier: 3

font:
  normal:
    family: JetBrainsMono Nerd Font
    style: Regular
  bold:
    family: JetBrainsMono Nerd Font
    style: Bold
  italic:
    family: JetBrainsMono Nerd Font
    style: Italic
  bold_italic:
    family: JetBrainsMono Nerd Font
    style: Bold Italic
  size: 11.0
  offset:
    x: 0
    y: 0
  glyph_offset:
    x: 0
    y: 0

colors:
  primary:
    background: '#2e0a1a'
    foreground: '#ffa07a'
  cursor:
    text: '#2e0a1a'
    cursor: '#ff4500'
  vi_mode_cursor:
    text: '#2e0a1a'
    cursor: '#ff6347'
  selection:
    text: CellForeground
    background: '#ff4500'
  normal:
    black:   '#2e0a1a'
    red:     '#dc143c'
    green:   '#ff6347'
    yellow:  '#ff7f50'
    blue:    '#ff8c00'
    magenta: '#ff4500'
    cyan:    '#ffa07a'
    white:   '#ffdab9'
  bright:
    black:   '#5e1a2e'
    red:     '#ff4500'
    green:   '#ff6347'
    yellow:  '#ff7f50'
    blue:    '#ffa07a'
    magenta: '#ff4500'
    cyan:    '#ffa07a'
    white:   '#ffffff'

bell:
  animation: EaseOutExpo
  duration: 0
  color: '#dc143c'

selection:
  semantic_escape_chars: ",│`|:"'" ()[]{}<>"
  save_to_clipboard: true

cursor:
  style:
    shape: Block
    blinking: On
  unfocused_hollow: true

shell:
  program: /bin/zsh

key_bindings:
  - { key: V, mods: Control|Shift, action: Paste }
  - { key: C, mods: Control|Shift, action: Copy }
  - { key: Insert, mods: Shift, action: PasteSelection }
  - { key: Key0, mods: Control, action: ResetFontSize }
  - { key: Equals, mods: Control, action: IncreaseFontSize }
  - { key: Plus, mods: Control, action: IncreaseFontSize }
  - { key: Minus, mods: Control, action: DecreaseFontSize }
  - { key: F11, mods: None, action: ToggleFullscreen }
  - { key: Paste, mods: None, action: Paste }
  - { key: Copy, mods: None, action: Copy }
  - { key: L, mods: Control, chars: "\x0c" }
  - { key: L, mods: Control, mode: ~Vi, chars: "\x0c" }
