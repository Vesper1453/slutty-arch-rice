# ╔══════════════════════════════════════════════════════════════════════════╗
# ║            ALACRITTY CONFIG - NORMAL MODE 💼✨                            ║
# ║          Clean dark theme, blue/cyan accents, professional              ║
# ╚══════════════════════════════════════════════════════════════════════════╝

window:
  dimensions:
    columns: 120
    lines: 35
  padding:
    x: 8
    y: 4
  decorations: none
  startup_mode: Windowed
  opacity: 0.90

scrolling:
  history: 10000
  multiplier: 3

font:
  normal:
    family: JetBrainsMono Nerd Font
    style: Regular
  bold:
    family: JetBrainsMono Nerd Font
    style: Bold
  italic:
    family: JetBrainsMono Nerd Font
    style: Italic
  bold_italic:
    family: JetBrainsMono Nerd Font
    style: Bold Italic
  size: 10.5
  offset:
    x: 0
    y: 0
  glyph_offset:
    x: 0
    y: 0

colors:
  primary:
    background: '#1e1e2e'
    foreground: '#cdd6f4'
  cursor:
    text: '#1e1e2e'
    cursor: '#89b4fa'
  vi_mode_cursor:
    text: '#1e1e2e'
    cursor: '#cba6f7'
  selection:
    text: CellForeground
    background: '#89b4fa'
  normal:
    black:   '#1e1e2e'
    red:     '#f38ba8'
    green:   '#a6e3a1'
    yellow:  '#f9e2af'
    blue:    '#89b4fa'
    magenta: '#cba6f7'
    cyan:    '#94e2d5'
    white:   '#cdd6f4'
  bright:
    black:   '#313244'
    red:     '#f38ba8'
    green:   '#a6e3a1'
    yellow:  '#f9e2af'
    blue:    '#89b4fa'
    magenta: '#cba6f7'
    cyan:    '#94e2d5'
    white:   '#ffffff'

bell:
  animation: EaseOutExpo
  duration: 0
  color: '#f38ba8'

selection:
  semantic_escape_chars: ",│`|:"'" ()[]{}<>"
  save_to_clipboard: true

cursor:
  style:
    shape: Block
    blinking: On
  unfocused_hollow: true

shell:
  program: /bin/zsh

key_bindings:
  - { key: V, mods: Control|Shift, action: Paste }
  - { key: C, mods: Control|Shift, action: Copy }
  - { key: Insert, mods: Shift, action: PasteSelection }
  - { key: Key0, mods: Control, action: ResetFontSize }
  - { key: Equals, mods: Control, action: IncreaseFontSize }
  - { key: Plus, mods: Control, action: IncreaseFontSize }
  - { key: Minus, mods: Control, action: DecreaseFontSize }
  - { key: F11, mods: None, action: ToggleFullscreen }
  - { key: Paste, mods: None, action: Paste }
  - { key: Copy, mods: None, action: Copy }
  - { key: L, mods: Control, chars: "\x0c" }
  - { key: L, mods: Control, mode: ~Vi, chars: "\x0c" }
