; ╔══════════════════════════════════════════════════════════════════════════╗
; ║               POLYBAR CONFIG - NORMAL MODE 💼✨                         ║
; ║        Professional, clean, sophisticated - business ready                 ║
; ╚══════════════════════════════════════════════════════════════════════════╝

[settings]
screenchange-reload = true

[colors]
background = #1e1e2e
background-alt = #313244
foreground = #cdd6f4
foreground-alt = #a6adc8
primary = #89b4fa
secondary = #cba6f7
alert = #f38ba8
disabled = #6c7086
accent1 = #89b4fa
accent2 = #cba6f7
accent3 = #fab387
transparent = #00000000

[bar/main]
monitor = ${env:MONITOR:}
width = 100%
height = 28pt
radius = 4
cursor-click = pointer
cursor-scroll = ns-resize

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2pt

padding-left = 2
padding-right = 2

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

font-0 = "JetBrainsMono Nerd Font:style=Regular:size=10;2"
font-1 = "Noto Color Emoji:scale=10;2"
font-2 = "Font Awesome 6 Free:style=Solid:pixelsize=11;2"
font-3 = "Font Awesome 6 Brands:pixelsize=11;2"

modules-left = i3 xwindow
modules-center = mode-indicator
modules-right = filesystem pulseaudio memory cpu date

trailing-padding = 2

enable-ipc = true

; ═══════════════════════════════════════════════════════════════════════════
; MODULES
; ═══════════════════════════════════════════════════════════════════════════

[module/i3]
type = internal/i3
format = <label-state> <label-mode>
index-sort = true
wrapping-scroll = false

pin-workspaces = true

label-mode-padding = 2
label-mode-foreground = #000
label-mode-background = ${colors.primary}

label-focused = %name%
label-focused-background = ${colors.background-alt}
label-focused-foreground = ${colors.foreground}
label-focused-underline = ${colors.primary}
label-focused-padding = 2

label-unfocused = %name%
label-unfocused-padding = 2

label-visible = %name%
label-visible-background = ${colors.background-alt}
label-visible-underline = ${colors.secondary}
label-visible-padding = 2

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 2

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%
label-foreground = ${colors.accent3}

[module/mode-indicator]
type = custom/text
content = ✨ NORMAL MODE ✨
content-foreground = ${colors.primary}
content-background = ${colors.background-alt}
content-padding = 3

[module/filesystem]
type = internal/fs
interval = 25
mount-0 = /
label-mounted = %{F${colors.accent1}}💾%{F-} %percentage_used%%
label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio
format-volume-prefix = "🔊 "
format-volume-prefix-foreground = ${colors.accent1}
format-volume = <label-volume>
label-volume = %percentage%%
label-muted = 🔇 muted
label-muted-foreground = ${colors.disabled}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "🧠 "
format-prefix-foreground = ${colors.accent2}
label = %percentage_used%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "⚡ "
format-prefix-foreground = ${colors.accent3}
label = %percentage%%

[module/date]
type = internal/date
interval = 1
date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S
label = %date%
label-foreground = ${colors.foreground}

[module/wlan]
type = internal/network
interface-type = wireless
interval = 3
format-connected = <ramp-signal> <label-connected>
format-connected-underline = #9f78e1
format-disconnected = 
label-connected = %essid%
ramp-signal-0 = 📶
ramp-signal-1 = 📶
ramp-signal-2 = 📶
ramp-signal-3 = 📶
ramp-signal-4 = 📶
ramp-signal-foreground = ${colors.accent1}

[module/eth]
type = internal/network
interface-type = wired
interval = 3
format-connected-prefix = "🌐 "
format-connected-prefix-foreground = ${colors.accent1}
label-connected = %local_ip%
format-disconnected = 

[module/battery]
type = internal/battery
full-at = 99
low-at = 5
battery = BAT0
adapter = ADP1
poll-interval = 5
label-charging = ⚡ %percentage%%
label-discharging = 🔋 %percentage%%
label-full = 🔋 100%
label-low = 🪫 LOW!

[module/temperature]
type = internal/temperature
thermal-zone = 0
warn-temperature = 60
format = <label>
format-warn = <label-warn>
label = 🌡️ %temperature-c%
label-warn = 🌡️ %temperature-c%
label-warn-foreground = ${colors.alert}
