[settings]
screenchange-reload = true
compositing-background = source
compositing-foreground = over
compositing-overline = over
compositing-underline = over

[colors]
; Deep, slutty purples and hot fucking pink
background = #1a0a2e
background-alt = #2d0f4e
foreground = #ffb6c1
foreground-alt = #ff69b4
primary = #ff1493        ; Deep pink
secondary = #ff0066      ; Hot fucking pink
accent = #ff00ff         ; Magenta slut
alert = #ff0000          ; Red alert
disabled = #6b4c6e
accent1 = #ff1493
accent2 = #ff0066
accent3 = #ff69b4
transparent = #00000000

[bar/main]
monitor = ${env:MONITOR:}
width = 100%
height = 38pt            ; Thicker bar for more slut visibility
radius = 12               ; Softer, rounder corners like a good slut
; Let's make it pop with an underline
line-size = 4pt
line-color = ${colors.primary}

cursor-click = pointer
cursor-scroll = ns-resize

background = ${colors.background}
foreground = ${colors.foreground}

; Padding for that luxurious slut feel
padding-left = 4
padding-right = 4

; Module spacing
module-margin = 2

; Sexy separator between modules
separator = │
separator-foreground = ${colors.primary}

; SLUTTY FONTS - You need to install these, slut!
; Nerd Font for icons, Noto for emojis
font-0 = "JetBrainsMono Nerd Font:style=Bold:size=12;3"
font-1 = "Noto Color Emoji:scale=11;3"
font-2 = "Font Awesome 6 Free:style=Solid:pixelsize=13;3"
font-3 = "Font Awesome 6 Brands:pixelsize=13;3"
font-4 = "DejaVu Sans Mono:style=Bold:pixelsize=12;3"

; Module layout - left is navigation, center is mode, right is system status
modules-left = i3 xwindow
modules-center = mode-indicator cum-counter
modules-right = filesystem pulseaudio memory cpu temperature date panic

; Extra padding at the ends
trailing-padding = 2

; Enable IPC for hot reloading
enable-ipc = true

; ═══════════════════════════════════════════════════════════════════════════
; SLUTTY MODULES - FOR THE FILTHY WHORE
; ═══════════════════════════════════════════════════════════════════════════

[module/i3]
type = internal/i3
format = <label-state> <label-mode>
index-sort = true
wrapping-scroll = false

; Only show workspaces on the same output as the bar
pin-workspaces = true

; Mode label (shows when you're in a special mode)
label-mode-padding = 3
label-mode-foreground = #000
label-mode-background = ${colors.primary}

; focused = Active workspace on focused monitor
label-focused = 💋 %name%
label-focused-background = ${colors.background-alt}
label-focused-foreground = ${colors.foreground}
label-focused-underline = ${colors.primary}
label-focused-padding = 3

; unfocused = Inactive workspace on any monitor
label-unfocused = %name%
label-unfocused-padding = 3
label-unfocused-foreground = ${colors.disabled}

; visible = Active workspace on unfocused monitor
label-visible = %name%
label-visible-background = ${colors.background-alt}
label-visible-underline = ${colors.secondary}
label-visible-padding = 3
label-visible-foreground = ${colors.foreground-alt}

; urgent = Workspace with urgency hint set
label-urgent = 🚨 %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 3
label-urgent-foreground = #fff

[module/xwindow]
type = internal/xwindow
label = 🍆 %title:0:50:...%
label-foreground = ${colors.accent3}
label-maxlen = 50

[module/mode-indicator]
type = custom/text
content = 💋 DEGENERATE 💋
content-foreground = ${colors.primary}
content-background = ${colors.background-alt}
content-padding = 4
content-font = 4

[module/panic]
; 🚨 PANIC BUTTON - CLICK TO LOOK RESPECTABLE!
type = custom/text
content = 🚨 PANIC 🚨
content-foreground = ${colors.alert}
content-background = ${colors.background-alt}
content-padding = 4
content-underline = ${colors.alert}
content-overline = ${colors.alert}

; Click to activate panic mode!
click-left = ~/.local/bin/panic-button

[module/cum-counter]
; 🥛 CUM COUNTER - TRACK YOUR DAILY PRODUCTIVITY!
type = custom/script
exec = echo "🥛 $(cat ~/.cum-count 2>/dev/null || echo 0)"
interval = 5
format-foreground = ${colors.secondary}
format-background = ${colors.background-alt}
format-padding = 3
format-underline = ${colors.primary}
click-left = notify-send "🥛 CUM COUNTER" "Loads released today: $(cat ~/.cum-count 2>/dev/null || echo 0)\n\nType 'cum' in terminal to increment!" && echo "💋" | xclip -selection clipboard
click-right = notify-send "🥛 CUM RESET" "Counter reset! Ready for more loads! 💦" && echo 0 > ~/.cum-count

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = 💾 %percentage_used%%
label-mounted-foreground = ${colors.accent1}
label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

; Volume up = louder moans
format-volume-prefix = "🔊 "
format-volume-prefix-foreground = ${colors.accent1}
format-volume = <label-volume>

label-volume = %percentage%%
label-volume-foreground = ${colors.foreground}

; Muted = no more moaning
label-muted = 🔇 SHHH
label-muted-foreground = ${colors.disabled}

; Click to toggle mute
click-right = exec pactl set-sink-mute @DEFAULT_SINK@ toggle

[module/memory]
type = internal/memory
interval = 2
format-prefix = "🧠 "
format-prefix-foreground = ${colors.accent2}
label = %percentage_used%%
label-foreground = ${colors.foreground}

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "⚡ "
format-prefix-foreground = ${colors.accent3}
label = %percentage%%
label-foreground = ${colors.foreground}

[module/temperature]
type = internal/temperature
thermal-zone = 0
warn-temperature = 75
base-temperature = 40

format = <ramp> <label>
format-warn = <ramp> <label-warn>
format-warn-foreground = ${colors.alert}

label = %temperature-c%°C
label-warn = 🔥 %temperature-c%°C HOT!

ramp-0 = ❄️
ramp-1 = 💧
ramp-2 = 🔥
ramp-3 = 🥵
ramp-4 = ☀️
ramp-foreground = ${colors.accent3}

[module/date]
type = internal/date
interval = 1

; Time for your next session
date = 🕐 %H:%M
date-alt = 📅 %Y-%m-%d 🕐 %H:%M:%S

label = %date%
label-foreground = ${colors.foreground}

; Click to show full date
type-right = internal/date
date-right = 📅 %Y-%m-%d

[module/wlan]
type = internal/network
interface-type = wireless
interval = 3

format-connected = <ramp-signal> <label-connected>
format-connected-underline = ${colors.secondary}

format-disconnected =

label-connected = %essid%
label-connected-foreground = ${colors.foreground}

ramp-signal-0 = 📶
ramp-signal-1 = 📶
ramp-signal-2 = 📶
ramp-signal-3 = 📶
ramp-signal-4 = 📶
ramp-signal-foreground = ${colors.accent1}

[module/eth]
type = internal/network
interface-type = wired
interval = 3

format-connected-prefix = "🌐 "
format-connected-prefix-foreground = ${colors.accent1}
label-connected = %local_ip%
label-connected-foreground = ${colors.foreground}

format-disconnected =

[module/battery]
type = internal/battery
full-at = 99
low-at = 10
battery = BAT0
adapter = ADP1
poll-interval = 5

format-charging = <animation-charging> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
format-full = <ramp-capacity> <label-full>
format-low = <animation-low> <label-low>

label-charging = ⚡ %percentage%%
label-discharging = %percentage%%
label-full = 100%
label-low = 🪫 %percentage%% PLUG ME IN!

label-charging-foreground = ${colors.foreground}
label-discharging-foreground = ${colors.foreground}
label-full-foreground = ${colors.accent1}
label-low-foreground = ${colors.alert}

ramp-capacity-0 = 🪫
ramp-capacity-1 = 🔋
ramp-capacity-2 = 🔋
ramp-capacity-3 = 🔋
ramp-capacity-4 = 🔋

animation-charging-0 = ⚡
animation-charging-1 = 🔌
animation-charging-framerate = 750

animation-low-0 = 🪫
animation-low-1 = 🚨
animation-low-framerate = 200

[module/bspwm]
type = internal/bspwm

label-focused = 💋 %name%
label-focused-background = ${colors.background-alt}
label-focused-underline= ${colors.primary}
label-focused-padding = 2

label-occupied = %name%
label-occupied-padding = 2

label-urgent = 🚨 %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 2

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 2

; vim: ft=dosini
