;                   The Slutty Status Bar 💋

; ═══════════════════════════════════════════════════════════════════════
; GLOBAL CONFIGURATION
; ═══════════════════════════════════════════════════════════════════════

[global/wm]
margin-bottom = 0
margin-top = 0

[settings]
screenchange-reload = true
compositing-background = source
compositing-foreground = over
compositing-overline = over
compositing-underline = over
compositing-border = over
pseudo-transparency = false

; ═══════════════════════════════════════════════════════════════════════
; COLORS (loaded from theme)
; ═══════════════════════════════════════════════════════════════════════

[colors]
background = ${env:POLY_BG:#aa1a0008}
background-alt = ${env:POLY_BG_ALT:#cc2d0012}
foreground = ${env:POLY_FG:#ffebf0}
foreground-alt = ${env:POLY_FG_ALT:#ccff99cc}

accent = ${env:POLY_ACCENT:#ff0055}
accent-alt = ${env:POLY_ACCENT_ALT:#ff00aa}

cpu = ${env:POLY_CPU:#ff66b2}
ram = ${env:POLY_RAM:#ff6699}
net = ${env:POLY_NET:#ff00aa}
vol = ${env:POLY_VOL:#ff3366}
bat = ${env:POLY_BAT:#ff99cc}
time = ${env:POLY_TIME:#ff0055}
date = ${env:POLY_DATE:#ff66cc}

; ═══════════════════════════════════════════════════════════════════════
; BAR CONFIGURATION
; ═══════════════════════════════════════════════════════════════════════

[bar/main]
monitor = ${env:MONITOR:}
monitor-strict = false
override-redirect = false
bottom = false
fixed-center = true

width = 100%
height = 32
offset-x = 0
offset-y = 0

background = ${colors.background}
foreground = ${colors.foreground}

border-bottom-size = 2
border-bottom-color = ${colors.accent}

line-size = 2

padding-left = 2
padding-right = 2
module-margin-left = 1
module-margin-right = 1

font-0 = JetBrainsMono Nerd Font:style=Regular:size=10;2
font-1 = JetBrainsMono Nerd Font:style=Bold:size=10;2
font-2 = Noto Color Emoji:scale=10;2

tray-position = right
tray-detached = false
tray-maxsize = 16
tray-transparent = false
tray-background = ${colors.background}
tray-offset-x = 0
tray-offset-y = 0
tray-padding = 2
tray-scale = 1.0

enable-ipc = true
cursor-click = pointer
cursor-scroll = ns-resize

; ═══════════════════════════════════════════════════════════════════════
; MODULES - LEFT
; ═══════════════════════════════════════════════════════════════════════

modules-left = i3 mode title

[module/i3]
type = internal/i3
pin-workspaces = true
show-all = false

format = <label-state> <label-mode>
format-background = ${colors.background}
format-padding = 1

label-mode = %mode%
label-mode-padding = 2
label-mode-background = ${colors.accent}
label-mode-foreground = #ffffff

label-focused = %index% %name%
label-focused-foreground = ${colors.accent}
label-focused-background = ${colors.background-alt}
label-focused-underline = ${colors.accent}
label-focused-padding = 2

label-unfocused = %index% %name%
label-unfocused-foreground = ${colors.foreground-alt}
label-unfocused-padding = 2

label-urgent = %index% %name%
label-urgent-foreground = #ffffff
label-urgent-background = ${colors.accent}
label-urgent-padding = 2

[module/mode]
type = custom/script
exec = cat ~/.config/polybar/current-mode.txt 2>/dev/null || echo "🔥 DEGENERATE"
interval = 1
format-prefix = "  "
format-foreground = ${colors.accent}
format-padding = 2

[module/title]
type = internal/xwindow
format = <label>
format-foreground = ${colors.foreground}
label = %title%
label-maxlen = 50
label-empty = "💋 Ready to play..."

; ═══════════════════════════════════════════════════════════════════════
; MODULES - CENTER
; ═══════════════════════════════════════════════════════════════════════

modules-center = player-mpris

[module/player-mpris]
type = custom/script
exec = ~/.config/polybar/mpris.sh
interval = 2
format = <label>
format-padding = 2
format-foreground = ${colors.accent}

; ═══════════════════════════════════════════════════════════════════════
; MODULES - RIGHT
; ═══════════════════════════════════════════════════════════════════════

modules-right = filesystem memory cpu pulseaudio battery network date time

[module/filesystem]
type = internal/fs
mount-0 = /
interval = 30

format-mounted = <label-mounted>
format-mounted-prefix = "💾 "
format-mounted-prefix-foreground = ${colors.ram}
format-mounted-padding = 1

label-mounted = %percentage_used%%
label-unmounted = not mounted

[module/memory]
type = internal/memory
interval = 2

format = <label>
format-prefix = "🧠 "
format-prefix-foreground = ${colors.ram}
format-padding = 1

label = %percentage_used%%

[module/cpu]
type = internal/cpu
interval = 2

format = <label>
format-prefix = "⚡ "
format-prefix-foreground = ${colors.cpu}
format-padding = 1

label = %percentage%%

[module/pulseaudio]
type = internal/pulseaudio
use-ui-max = true
interval = 5

format-volume = <ramp-volume> <label-volume>
format-volume-padding = 1
format-volume-foreground = ${colors.vol}

format-muted = <label-muted>
format-muted-padding = 1
label-muted = "🔇 Muted"
label-muted-foreground = ${colors.foreground-alt}

ramp-volume-0 = 🔊
ramp-volume-1 = 🔊
ramp-volume-2 = 🔊

click-right = pavucontrol

[module/battery]
type = internal/battery
full-at = 99
low-at = 20

poll-interval = 5

format-charging = <animation-charging> <label-charging>
format-charging-padding = 1
format-charging-foreground = ${colors.bat}

format-discharging = <ramp-capacity> <label-discharging>
format-discharging-padding = 1
format-discharging-foreground = ${colors.bat}

format-full = <ramp-capacity> <label-full>
format-full-padding = 1
format-full-foreground = ${colors.bat}

format-low = <animation-low> <label-low>
format-low-padding = 1
format-low-foreground = #ff0000

ramp-capacity-0 = 🪫
ramp-capacity-1 = 🔋
ramp-capacity-2 = 🔋

animation-charging-0 = ⚡
animation-charging-1 = 🔌
animation-charging-framerate = 750

animation-low-0 = 🚨
animation-low-1 = ⚠️
animation-low-framerate = 200

[module/network]
type = internal/network
interface = ${env:INTERFACE:wlp2s0}
interface-type = wireless
interval = 3.0
unknown-as-up = true

format-connected = <ramp-signal> <label-connected>
format-connected-padding = 1
format-connected-foreground = ${colors.net}

format-disconnected = <label-disconnected>
format-disconnected-padding = 1
format-disconnected-foreground = ${colors.foreground-alt}

label-connected = %essid% %downspeed:9%
label-disconnected = "🚫 Offline"

ramp-signal-0 = 📶
ramp-signal-1 = 📶
ramp-signal-2 = 📶
ramp-signal-3 = 📶
ramp-signal-4 = 📶

[module/date]
type = internal/date
interval = 60

date = %a, %b %d
format = <label>
format-prefix = "📅 "
format-prefix-foreground = ${colors.date}
format-padding = 1
label = %date%

[module/time]
type = internal/date
interval = 5

time = %H:%M
format = <label>
format-prefix = "⏰ "
format-prefix-foreground = ${colors.time}
format-padding = 1
label = %time%

; ═══════════════════════════════════════════════════════════════════════
; MENU MODULES
; ═══════════════════════════════════════════════════════════════════════

[module/powermenu]
type = custom/menu

expand-right = true
format-spacing = 1

label-open = "⏻"
label-open-foreground = ${colors.accent}
label-close = "✕ Cancel"
label-close-foreground = ${colors.accent}
label-separator = " | "

menu-0-0 = "⏻ Shutdown"
menu-0-0-exec = systemctl poweroff
menu-0-1 = "🔄 Reboot"
menu-0-1-exec = systemctl reboot
menu-0-2 = "💤 Suspend"
menu-0-2-exec = systemctl suspend
menu-0-3 = "🚪 Logout"
menu-0-3-exec = i3-msg exit
