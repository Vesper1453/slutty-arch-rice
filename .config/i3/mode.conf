# ╔══════════════════════════════════════════════════════════════════════════╗
# ║         MODE-SPECIFIC THEME CONFIGURATION                                ║
# ║    This file is automatically updated by ~/.local/bin/switch-mode      ║
# ╚══════════════════════════════════════════════════════════════════════════╝

# ═══════════════════════════════════════════════════════════════════════════
# DEGENERATE MODE - Maximum sluttiness 💋🔥🍆
# ═══════════════════════════════════════════════════════════════════════════

# Hot pink and deep purple color scheme
set $bg #1a0a2e
set $border #ff1493
set $border_active #ff69b4
set $text #ffb6c1
set $urgent #ff0000
set $indicator #ff1493

# ═══════════════════════════════════════════════════════════════════════════
# COLOR CONFIGURATION
# ═══════════════════════════════════════════════════════════════════════════

# Client colors                    border     background  text        indicator  child_border
client.focused                     $border_active $bg      $text       $indicator $border_active
client.focused_inactive            $border     $bg        $text       $indicator $border
client.unfocused                   $border     $bg        $text       $indicator $border
client.urgent                      $urgent     $urgent    #ffffff     $indicator $urgent
client.placeholder                 #000000     #0c0c0c    #ffffff     #000000    #0c0c0c

client.background                  #1a0a2e

# ═══════════════════════════════════════════════════════════════════════════
# GAPS FOR DEGENERATE MODE (Extra wide gaps for that exposed feeling)
# ═══════════════════════════════════════════════════════════════════════════

gaps inner 15
gaps outer 5

# ═══════════════════════════════════════════════════════════════════════════
# MODE INDICATOR
# ═══════════════════════════════════════════════════════════════════════════

# Visual indicator that we're in degenerate mode
bindsym $mod+m exec notify-send "💋 DEGENERATE MODE ACTIVE 💋" "Pure, unfiltered slut energy unleashed! 🍆🔥"
