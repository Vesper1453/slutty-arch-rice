# ╔══════════════════════════════════════════════════════════════════════════╗
# ║              PICOM CONFIG - SLUTTY ARCH RICE 💋                            ║
# ║    Compositor for transparency, blur effects, and animations           ║
# ╚══════════════════════════════════════════════════════════════════════════╝

# ═══════════════════════════════════════════════════════════════════════════
# SHADOWS
# ═══════════════════════════════════════════════════════════════════════════

shadow = true;
shadow-radius = 12;
shadow-offset-x = -12;
shadow-offset-y = -12;
shadow-opacity = 0.3;
shadow-color = "#000000";

# Exclude shadows for certain windows
shadow-exclude = [
    "name = 'Notification'",
    "class_g = 'Conky'",
    "class_g ?= 'Notify-osd'",
    "class_g = 'Cairo-clock'",
    "_GTK_FRAME_EXTENTS@:c"
];

# ═══════════════════════════════════════════════════════════════════════════
# FADING
# ═══════════════════════════════════════════════════════════════════════════

fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 5;

# ═══════════════════════════════════════════════════════════════════════════
# TRANSPARENCY / OPACITY
# ═══════════════════════════════════════════════════════════════════════════

inactive-opacity = 0.88;
active-opacity = 0.95;
frame-opacity = 0.9;

# Make specific windows more transparent
opacity-rule = [
    "90:class_g = 'Alacritty' && focused",
    "80:class_g = 'Alacritty' && !focused",
    "92:class_g = 'Rofi'",
    "85:class_g = 'Polybar'",
    "95:focused",
    "82:!focused && !class_g = 'i3-frame'",
    "90:class_g = 'Dunst'",
    "95:class_g = 'Firefox' && focused",
    "85:class_g = 'Firefox' && !focused"
];

# ═══════════════════════════════════════════════════════════════════════════
# BLUR
# ═══════════════════════════════════════════════════════════════════════════

blur-background = true;
blur-method = "dual_kawase";
blur-strength = 5;
blur-background-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "class_g = 'slop'",
    "_GTK_FRAME_EXTENTS@:c"
];

# ═══════════════════════════════════════════════════════════════════════════
# CORNER RADIUS
# ═══════════════════════════════════════════════════════════════════════════

corner-radius = 12;
rounded-corners-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "class_g = 'Polybar'",
    "class_g = 'Dunst'"
];

# ═══════════════════════════════════════════════════════════════════════════
# ANIMATIONS (requires picom-animations or picom-ftlabs)
# ═══════════════════════════════════════════════════════════════════════════

# animations = true;
# animation-window-mass = 0.4;
# animation-dampening = 15;
# animation-stiffness = 200;
# animation-for-open-window = "slide-down";
# animation-for-unmap-window = "slide-up";
# animation-for-transient-window = "slide-down";
# animation-for-workspace-switch-in = "slide-left";
# animation-for-workspace-switch-out = "slide-right";

# ═══════════════════════════════════════════════════════════════════════════
# V-SYNC & PERFORMANCE
# ═══════════════════════════════════════════════════════════════════════════

vsync = true;
dbe = false;
unredir-if-possible = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
detect-client-leader = true;
use-damage = true;
glx-no-stencil = true;
glx-copy-from-front = false;

# ═══════════════════════════════════════════════════════════════════════════
# WINDOW TYPE RULES
# ═══════════════════════════════════════════════════════════════════════════

wintypes:
{
    tooltip = 
    { 
        fade = true; 
        shadow = false; 
        opacity = 0.9;
        focus = true;
    };
    
    dock = 
    { 
        shadow = false;
        opacity = 0.85;
    };
    
    dnd = 
    { 
        shadow = false; 
    };
    
    popup_menu = 
    {
        opacity = 0.95;
    };
    
    dropdown_menu = 
    {
        opacity = 0.95;
    };
    
    dialog = 
    {
        opacity = 0.95;
    };
    
    menu = 
    {
        opacity = 0.95;
    };
};

# ═══════════════════════════════════════════════════════════════════════════
# OTHER SETTINGS
# ═══════════════════════════════════════════════════════════════════════════

mark-wmwin-focused = true;
mark-ovredir-focused = true;
use-ewmh-active-win = true;
focus-exclude = [ "class_g = 'Cairo-clock'" ];
