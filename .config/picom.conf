# ═══════════════════════════════════════════════════════════════════════
# PICOM CONFIGURATION - Transparent & Sexy Compositor
# ═══════════════════════════════════════════════════════════════════════

# ═══════════════════════════════════════════════════════════════════════
# BACKEND
# ═══════════════════════════════════════════════════════════════════════

backend = "glx";
vsync = true;
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
refresh-rate = 0;
use-damage = true;
log-level = "warn";

# ═══════════════════════════════════════════════════════════════════════
# OPACITY - TRANSPARENT WINDOWS 💋
# ═══════════════════════════════════════════════════════════════════════

active-opacity = 0.95;
inactive-opacity = 0.90;
frame-opacity = 0.95;

# Opacity rules for specific windows
opacity-rule = [
    # Terminal transparency
    "85:class_g = 'kitty' && focused",
    "75:class_g = 'kitty' && !focused",
    
    # Status bar
    "90:class_g = 'Polybar'",
    
    # Rofi menus
    "85:class_g = 'Rofi'",
    
    # Keep these fully opaque
    "100:class_g = 'Firefox' && focused",
    "95:class_g = 'Firefox' && !focused",
    "100:class_g = 'Chromium' && focused",
    "95:class_g = 'Chromium' && !focused",
    
    # Notifications
    "95:window_type = 'notification'",
    
    # Dialogs
    "98:window_type = 'dialog'",
    "98:window_type = 'menu'",
    "98:window_type = 'popup_menu'",
    "98:window_type = 'dropdown_menu'"
];

# ═══════════════════════════════════════════════════════════════════════
# BLUR - SEXY GLASS EFFECT 🔥
# ═══════════════════════════════════════════════════════════════════════

blur-method = "dual_kawase";
blur-strength = 10;
blur-background = true;
blur-background-frame = true;
blur-background-fixed = false;

blur-background-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "class_g = 'i3bar'"
];

# ═══════════════════════════════════════════════════════════════════════
# CORNERS - ROUNDED WINDOWS 💖
# ═══════════════════════════════════════════════════════════════════════

corner-radius = 12;

rounded-corners-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "class_g = 'i3bar'",
    "class_g = 'Polybar'",
    "class_g ?= 'notify-osd'"
];

# ═══════════════════════════════════════════════════════════════════════
# SHADOWS - DEPTH & DIMENSION
# ═══════════════════════════════════════════════════════════════════════

shadow = true;
shadow-radius = 15;
shadow-opacity = 0.75;
shadow-offset-x = -10;
shadow-offset-y = -10;

shadow-color = "#ff0055";

shadow-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "class_g = 'i3bar'",
    "class_g ?= 'notify-osd'",
    "_GTK_FRAME_EXTENTS@:c"
];

# ═══════════════════════════════════════════════════════════════════════
# FADING - SMOOTH TRANSITIONS
# ═══════════════════════════════════════════════════════════════════════

fading = true;
fade-delta = 4;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-exclude = [];

# ═══════════════════════════════════════════════════════════════════════
# ANIMATIONS - MODERN & SMOOTH
# ═══════════════════════════════════════════════════════════════════════

animations = true;
animation-for-transient-window = "slide";
animation-for-open-window = "grow";
animation-for-unmap-window = "shrink";
animation-for-workspace-switch-in = "fade";
animation-for-workspace-switch-out = "fade";

animation-stiffness = 200;
animation-dampening = 25;
animation-window-mass = 1.0;
animation-clamping = true;

# ═══════════════════════════════════════════════════════════════════════
# OTHER SETTINGS
# ═══════════════════════════════════════════════════════════════════════

# Dimming
dim-inactive = false;
dim-opacity = 0.3;

# Focus
focus-exclude = [
    "class_g = 'Cairo-clock'",
    "class_g = 'slop'"
];

# ═══════════════════════════════════════════════════════════════════════
# WMTYPE FIXES
# ═══════════════════════════════════════════════════════════════════════

wintypes:
{
    tooltip = { fade = true; shadow = false; focus = false; };
    menu = { shadow = false; };
    popup_menu = { shadow = false; };
    dropdown_menu = { shadow = false; };
    dialog = { shadow = true; };
    normal = { shadow = true; };
    dock = { shadow = false; };
    notification = { shadow = false; };
    utility = { shadow = false; };
    combo = { shadow = false; };
    dnd = { shadow = false; };
    toolbar = { shadow = false; };
    splash = { shadow = false; };
    dialog = { shadow = true; };
    menu = { shadow = false; };
    dropdown_menu = { shadow = false; };
    popup_menu = { shadow = false; };
};
