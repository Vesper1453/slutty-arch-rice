# ╔══════════════════════════════════════════════════════════════════════════╗
# ║            ALACRITTY CONFIG - DEGENERATE MODE 💋🔥                       ║
# ║         Deep purple background, hot pink accents, slutty energy        ║
# ╚══════════════════════════════════════════════════════════════════════════╝

window:
  dimensions:
    columns: 120
    lines: 35
  padding:
    x: 12
    y: 8
  decorations: none
  startup_mode: Windowed
  opacity: 0.85

scrolling:
  history: 10000
  multiplier: 3

font:
  normal:
    family: JetBrainsMono Nerd Font
    style: Regular
  bold:
    family: JetBrainsMono Nerd Font
    style: Bold
  italic:
    family: JetBrainsMono Nerd Font
    style: Italic
  bold_italic:
    family: JetBrainsMono Nerd Font
    style: Bold Italic
  size: 11.0
  offset:
    x: 0
    y: 0
  glyph_offset:
    x: 0
    y: 0

colors:
  primary:
    background: '#1a0a2e'
    foreground: '#ffb6c1'
  cursor:
    text: '#1a0a2e'
    cursor: '#ff1493'
  vi_mode_cursor:
    text: '#1a0a2e'
    cursor: '#ff69b4'
  selection:
    text: CellForeground
    background: '#ff1493'
  normal:
    black:   '#1a0a2e'
    red:     '#ff0066'
    green:   '#ff69b4'
    yellow:  '#ff1493'
    blue:    '#da70d6'
    magenta: '#ff00ff'
    cyan:    '#ff69b4'
    white:   '#ffb6c1'
  bright:
    black:   '#4a2c5e'
    red:     '#ff1493'
    green:   '#ff69b4'
    yellow:  '#ff00ff'
    blue:    '#ff69b4'
    magenta: '#ff00ff'
    cyan:    '#ffb6c1'
    white:   '#ffffff'

bell:
  animation: EaseOutExpo
  duration: 0
  color: '#ff0000'

selection:
  semantic_escape_chars: ",│`|:"'" ()[]{}<>"
  save_to_clipboard: true

cursor:
  style:
    shape: Block
    blinking: On
  unfocused_hollow: true

shell:
  program: /bin/zsh

key_bindings:
  - { key: V, mods: Control|Shift, action: Paste }
  - { key: C, mods: Control|Shift, action: Copy }
  - { key: Insert, mods: Shift, action: PasteSelection }
  - { key: Key0, mods: Control, action: ResetFontSize }
  - { key: Equals, mods: Control, action: IncreaseFontSize }
  - { key: Plus, mods: Control, action: IncreaseFontSize }
  - { key: Minus, mods: Control, action: DecreaseFontSize }
  - { key: F11, mods: None, action: ToggleFullscreen }
  - { key: Paste, mods: None, action: Paste }
  - { key: Copy, mods: None, action: Copy }
  - { key: L, mods: Control, chars: "\x0c" }
  - { key: L, mods: Control, mode: ~Vi, chars: "\x0c" }
