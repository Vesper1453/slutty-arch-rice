#  █████╔╝ ██║   ██║      ██║    ╚████╔╝ 
#  ██╔═██╗ ██║   ██║      ██║     ╚██╔╝  
#  ██║  ██╗██║   ██║      ██║      ██║   
#  ╚═╝  ╚═╝╚═╝   ╚═╝      ╚═╝      ╚═╝   
#         The Slutty Terminal 💋

# ═══════════════════════════════════════════════════════════════════════
# FONTS
# ═══════════════════════════════════════════════════════════════════════

font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
bold_italic_font JetBrainsMono Nerd Font Bold Italic

font_size 11.0

# ═══════════════════════════════════════════════════════════════════════
# CURSOR
# ═══════════════════════════════════════════════════════════════════════

cursor_shape beam
cursor_beam_thickness 1.5
cursor_blink_interval 0.5
cursor_stop_blinking_after 15.0

# ═══════════════════════════════════════════════════════════════════════
# SCROLLBACK
# ═══════════════════════════════════════════════════════════════════════

scrollback_lines 10000
scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER
scrollback_pager_history_size 0

# ═══════════════════════════════════════════════════════════════════════
# MOUSE
# ═══════════════════════════════════════════════════════════════════════

mouse_hide_wait 3.0
detect_urls yes
url_color #0087bd
url_style curly

# ═══════════════════════════════════════════════════════════════════════
# WINDOW LAYOUT
# ═══════════════════════════════════════════════════════════════════════

remember_window_size  yes
initial_window_width  100c
initial_window_height 30c
window_border_width 0
draw_minimal_borders yes
window_padding_width 4
window_margin_width 0

placement_strategy center
active_border_color none
inactive_border_color none
bell_border_color #ff0055

# ═══════════════════════════════════════════════════════════════════════
# TAB BAR
# ═══════════════════════════════════════════════════════════════════════

tab_bar_edge bottom
tab_bar_margin_width 0.0
tab_bar_style fade
tab_fade 0.25 0.5
tab_title_template {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}
active_tab_font_style bold
inactive_tab_font_style normal
tab_activity_symbol 💋

# ═══════════════════════════════════════════════════════════════════════
# BACKGROUND OPACITY (handled by theme loader)
# ═══════════════════════════════════════════════════════════════════════

# These values are updated by the theme switcher
background_opacity 0.85
background_blur 64

# ═══════════════════════════════════════════════════════════════════════
# PERFORMANCE
# ═══════════════════════════════════════════════════════════════════════

repaint_delay 10
input_delay 3
sync_to_monitor yes

# ═══════════════════════════════════════════════════════════════════════
# TERMINAL BELL
# ═══════════════════════════════════════════════════════════════════════

enable_audio_bell no
visual_bell_duration 0.0
visual_bell_color none

# ═══════════════════════════════════════════════════════════════════════
# ADVANCED
# ═══════════════════════════════════════════════════════════════════════

shell_integration enabled
allow_hyperlinks yes
term xterm-kitty

# ═══════════════════════════════════════════════════════════════════════
# KEY MAPPINGS
# ═══════════════════════════════════════════════════════════════════════

# Clipboard
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

# Tabs
map ctrl+shift+t new_tab
map ctrl+shift+q close_tab
map ctrl+shift+right next_tab
map ctrl+shift+left previous_tab

# Windows
map ctrl+shift+enter new_window
map ctrl+shift+w close_window
map ctrl+shift+] next_window
map ctrl+shift+[ previous_window

# Font sizes
map ctrl+shift+equal change_font_size all +2.0
map ctrl+shift+minus change_font_size all -2.0
map ctrl+shift+backspace change_font_size all 0

# ═══════════════════════════════════════════════════════════════════════
# INCLUDE THEME COLORS (auto-generated by theme-loader.sh)
# ═══════════════════════════════════════════════════════════════════════

include ~/.config/kitty/theme-colors.conf

# ═══════════════════════════════════════════════════════════════════════
# ADDITIONAL CONFIGS
# ═══════════════════════════════════════════════════════════════════════

# Enable remote control for theme switching
allow_remote_control yes
listen_on unix:/tmp/kitty
