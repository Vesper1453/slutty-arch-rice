# See this wiki page for more info: https://github.com/dylanaraps/neofetch/wiki/Customizing-Info

# ═══════════════════════════════════════════════════════════════════════════
# PRINT INFO
# ═══════════════════════════════════════════════════════════════════════════

print_info() {
    info "💋 User" title
    info "🔥 OS" distro
    info "🍆 Kernel" kernel
    info "⚡ Uptime" uptime
    info "📦 Packages" packages
    info "🐚 Shell" shell
    info "🖥️  Resolution" resolution
    info "🎨 DE" de
    info "🪟 WM" wm
    info "🎭 Theme" theme
    info "💻 Terminal" term
    info "🔮 CPU" cpu
    info "🧠 GPU" gpu
    info "💾 Memory" memory
    
    # Mode-specific extra info
    if [[ -f ~/.config/arch-rice-mode ]]; then
        local mode=$(cat ~/.config/arch-rice-mode)
        case "$mode" in
            degenerate)
                prin "💋 Current Mode" "DEGENERATE (Maximum slut energy!)"
                ;;
            horny)
                prin "🔥 Current Mode" "HORNY (Warm and flirty)"
                ;;
            normal)
                prin "💼 Current Mode" "NORMAL (Professional and clean)"
                ;;
        esac
    fi
    
    info cols
}

# ═══════════════════════════════════════════════════════════════════════════
# COLORS
# ═══════════════════════════════════════════════════════════════════════════

# Colors based on current mode
get_colors() {
    if [[ -f ~/.config/arch-rice-mode ]]; then
        local mode=$(cat ~/.config/arch-rice-mode)
        case "$mode" in
            degenerate)
                # Hot pink / Deep purple
                set_colors 201 198 199 200 205 206 207 13
                ;;
            horny)
                # Orange / Red
                set_colors 202 203 208 209 214 215 216 220
                ;;
            normal)
                # Blue / Purple
                set_colors 67 68 69 75 104 111 141 147
                ;;
        esac
    else
        # Default - degenerate style
        set_colors 201 198 199 200 205 206 207 13
    fi
}

# ═══════════════════════════════════════════════════════════════════════════
# ASCII ART
# ═══════════════════════════════════════════════════════════════════════════

# Mode-aware ASCII art
ascii() {
    if [[ -f ~/.config/arch-rice-mode ]]; then
        local mode=$(cat ~/.config/arch-rice-mode)
        case "$mode" in
            degenerate)
                # Slutty ASCII
                cat << 'EOF'
       💋💋💋
      🔥 🔥 🔥
    🍆 SLUTTY 🍆
     ARCH LINUX
      🔥 💋 🔥
EOF
                ;;
            horny)
                # Hot ASCII
                cat << 'EOF'
       🔥🔥🔥
      💦 💦 💦
    🔥 HORNY 🔥
     ARCH LINUX
      💦 🔥 💦
EOF
                ;;
            normal)
                # Professional ASCII
                cat << 'EOF'
       ✨✨✨
      💼 💼 💼
    ✨ ARCH ✨
     LINUX ✨
      💼 ✨ 💼
EOF
                ;;
        esac
    fi
}

# ═══════════════════════════════════════════════════════════════════════════
# OPTIONS
# ═══════════════════════════════════════════════════════════════════════════

# Backend
image_backend="ascii"
image_source="auto"

# Ascii
ascii_distro="auto"
ascii_colors=(distro)
ascii_bold="on"

# Image
thrumbnail_dir="${XDG_CACHE_HOME:-${HOME}/.cache}/thumbnails/neofetch"
crop_mode="normal"
crop_offset="center"
image_size="auto"
gap=3
yoffset=0
xoffset=0
background_color=

# Misc Options
stdout="off"
refresh_rate="on"
shell_path="off"
shell_version="on"
disk_show=('/')
disk_subtitle="mount"

# Text Colors
colors=(get_colors)

# Bold
bold="on"

# Underline
underline_enabled="on"
underline_char="─"

# Separator
separator=" ── "

# Color Blocks
block_range=(0 15)
color_blocks="on"
block_width=3
block_height=1
col_offset=auto

# Bar
bar_char_elapsed="─"
bar_char_total="─"
bar_border="on"
bar_length=15
bar_color_elapsed="distro"
bar_color_total="distro"
cpu_display="off"
memory_display="off"
battery_display="off"
disk_display="off"

# Backend
image_backend="ascii"
image_source="auto"

# ═══════════════════════════════════════════════════════════════════════════
# INFO FUNCTIONS
# ═══════════════════════════════════════════════════════════════════════════

# Show package count
package_managers="on"

# CPU
speed_type="bios_limit"
speed_shorthand="on"
cpu_brand="on"
cpu_speed="on"
cpu_cores="logical"
cpu_temp="C"

# GPU
gpu_brand="on"
gpu_type="all"

# Resolution
refresh_rate="on"

# Gtk theme
gtk_shorthand="off"
gtk2="on"
gtk3="on"

# Disk
disk_show=('/')
disk_subtitle="mount"

# Song
music_player="auto"
song_format="%artist% - %album% - %title%"
song_shorthand="off"
mmpc_args=()
cmus_args=()
mocp_args=()

# Battery
battery="all"
battery_display="bar"

# IP
public_ip_host="http://ident.me"
public_ip_timeout=2

# User and hostname
title_fqdn="off"

# ═══════════════════════════════════════════════════════════════════════════
# CONFIG VERSION
# ═══════════════════════════════════════════════════════════════════════════

config_version="2.1.0"
